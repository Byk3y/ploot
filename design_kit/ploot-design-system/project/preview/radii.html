<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.r{display:flex;flex-direction:column;gap:6px;align-items:center}
.box{background:var(--bg-elevated);border:2px solid var(--border-ink);box-shadow:var(--shadow-pop)}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg2);font-weight:600}
</style></head><body>
<div class="r"><div class="box" style="width:60px;height:60px;border-radius:6px"></div><div class="label">xs · 6</div></div>
<div class="r"><div class="box" style="width:60px;height:60px;border-radius:10px"></div><div class="label">sm · 10</div></div>
<div class="r"><div class="box" style="width:60px;height:60px;border-radius:14px"></div><div class="label">md · 14</div></div>
<div class="r"><div class="box" style="width:60px;height:60px;border-radius:20px"></div><div class="label">lg · 20</div></div>
<div class="r"><div class="box" style="width:60px;height:60px;border-radius:28px"></div><div class="label">xl · 28</div></div>
<div class="r"><div class="box" style="width:60px;height:60px;border-radius:9999px"></div><div class="label">full</div></div>
</body></html>
