<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg);display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.sw{display:flex;flex-direction:column;gap:4px}
.chip{height:56px;border-radius:12px;border:1.5px solid var(--border-ink);box-shadow:var(--shadow-sm)}
.name{font-family:var(--font-mono);font-size:9px;color:var(--fg2);font-weight:600;text-align:center}
.hex{font-family:var(--font-mono);font-size:8px;color:var(--fg3);text-align:center}
</style></head><body>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-50)"></div><div class="name">50</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-100)"></div><div class="name">100</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-200)"></div><div class="name">200</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-300)"></div><div class="name">300</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-400)"></div><div class="name">400</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-500);outline:2px solid var(--border-ink);outline-offset:2px"></div><div class="name" style="color:var(--primary)">500 ★</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-600)"></div><div class="name">600</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-700)"></div><div class="name">700</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-800)"></div><div class="name">800</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-clay-900)"></div><div class="name">900</div></div>
</body></html>
