<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:9999px;font-family:var(--font-sans);font-size:12px;font-weight:600;white-space:nowrap}
.ink{background:var(--bg-sunken);color:var(--fg2)}
.clay{background:var(--ploot-clay-100);color:var(--ploot-clay-700)}
.forest{background:var(--ploot-forest-100);color:var(--ploot-forest-700)}
.butter{background:var(--ploot-butter-100);color:#7a5a00}
.plum{background:var(--ploot-plum-100);color:var(--ploot-plum-500)}
.sky{background:var(--ploot-sky-100);color:var(--ploot-sky-500)}
.selected{background:var(--border-ink);color:#fff}
.dot{width:6px;height:6px;border-radius:50%}
</style></head><body>
<span class="chip ink">deep work</span>
<span class="chip clay">📅 Today</span>
<span class="chip sky">📁 Work</span>
<span class="chip forest">✓ Home</span>
<span class="chip butter">★ Starred</span>
<span class="chip plum">🔥 Urgent</span>
<span class="chip selected">sprint</span>
<span class="chip ink"><span class="dot" style="background:var(--primary)"></span>Reading</span>
</body></html>
