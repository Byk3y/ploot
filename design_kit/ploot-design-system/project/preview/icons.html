<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body{margin:0;padding:22px;background:var(--bg);display:flex;gap:22px;flex-wrap:wrap;align-items:center;color:var(--fg1)}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg3);font-weight:500}
i[data-lucide]{display:inline-flex;width:24px;height:24px;stroke-width:2;color:var(--fg1)}
</style></head><body>
<div class="item"><i data-lucide="plus"></i><div class="label">plus</div></div>
<div class="item"><i data-lucide="sun"></i><div class="label">sun</div></div>
<div class="item"><i data-lucide="calendar"></i><div class="label">calendar</div></div>
<div class="item"><i data-lucide="folder-open"></i><div class="label">folder-open</div></div>
<div class="item"><i data-lucide="check-circle"></i><div class="label">check-circle</div></div>
<div class="item"><i data-lucide="bell"></i><div class="label">bell</div></div>
<div class="item"><i data-lucide="flag"></i><div class="label">flag</div></div>
<div class="item"><i data-lucide="flame"></i><div class="label">flame</div></div>
<div class="item"><i data-lucide="repeat"></i><div class="label">repeat</div></div>
<div class="item"><i data-lucide="paperclip"></i><div class="label">paperclip</div></div>
<div class="item"><i data-lucide="more-horizontal"></i><div class="label">more</div></div>
<div class="item"><i data-lucide="arrow-left"></i><div class="label">arrow</div></div>
<script>lucide.createIcons();</script>
</body></html>
