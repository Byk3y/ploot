<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);display:flex;flex-direction:column;gap:18px}

.label{font-family:var(--font-mono);font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;white-space:nowrap;width:72px;flex-shrink:0}

</style></head><body>
<div class="row"><div class="label">Display</div><div class="sample t-display" style="font-size:42px;line-height:1.05">Crush today.</div><div class="meta">Fraunces · 42/500</div></div>
<div class="row"><div class="label">H1</div><div class="sample t-h1" style="font-size:30px">All done here.</div><div class="meta">Fraunces · 30/500</div></div>
<div class="row"><div class="label">H2</div><div class="sample t-h2" style="font-size:22px">What's next?</div><div class="meta">Fraunces · 22/500</div></div>
<div class="row"><div class="label">Italic</div><div class="sample t-serif-italic" style="font-size:22px;color:var(--fg2)">— Tuesday, Apr 21</div><div class="meta">Fraunces Italic</div></div>
</body></html>
