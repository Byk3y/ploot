<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg);display:flex;flex-direction:column;gap:0}
.row{display:flex;gap:12px;padding:12px 16px;align-items:flex-start;background:#fff;border-bottom:1px solid var(--border)}
.cb{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--border-strong);margin-top:2px;flex-shrink:0}
.cb.done{background:var(--success);border-color:var(--success)}
.cb.urgent{border-color:var(--primary)}
.title{font-size:15px;font-weight:500;color:var(--fg1);letter-spacing:-0.005em}
.title.done{text-decoration:line-through;opacity:.5}
.meta{display:flex;gap:6px;margin-top:6px;align-items:center;font-size:12px;color:var(--fg2)}
.dot{width:6px;height:6px;border-radius:50%}
.fire{font-size:14px;color:var(--primary)}
</style></head><body>
<div class="row">
  <div class="cb urgent"></div>
  <div style="flex:1">
    <div class="title">Reply to the one email I've been avoiding</div>
    <div class="meta"><span>📅 Today, 2:00 PM</span><span class="dot" style="background:var(--ploot-sky-500)"></span><span>Work</span></div>
  </div>
  <span class="fire">🔥</span>
</div>
<div class="row">
  <div class="cb"></div>
  <div style="flex:1">
    <div class="title">Buy more oat milk (again)</div>
    <div class="meta"><span>📅 Today</span><span class="dot" style="background:var(--ploot-butter-500)"></span><span>Errands</span></div>
  </div>
</div>
<div class="row">
  <div class="cb done"><svg width="14" height="14" viewBox="0 0 24 24" style="margin:2px 0 0 2px"><path d="M5 12 L10 17 L19 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none"/></svg></div>
  <div style="flex:1">
    <div class="title done">Go for a walk (a real one)</div>
  </div>
</div>
</body></html>
