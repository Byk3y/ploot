<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:var(--bg);display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.swatch{padding:14px;border-radius:14px;border:2px solid var(--border-ink);box-shadow:var(--shadow-pop);display:flex;flex-direction:column;gap:6px}
.name{font-family:var(--font-sans);font-size:13px;font-weight:700}
.role{font-family:var(--font-mono);font-size:10px;opacity:.7;font-weight:500}
</style></head><body>
<div class="swatch" style="background:var(--ploot-forest-500);color:#fff"><div class="name">Forest</div><div class="role">success · done</div></div>
<div class="swatch" style="background:var(--ploot-butter-300);color:#000"><div class="name">Butter</div><div class="role">warning · highlight</div></div>
<div class="swatch" style="background:var(--ploot-plum-500);color:#fff"><div class="name">Plum</div><div class="role">danger · urgent</div></div>
<div class="swatch" style="background:var(--ploot-sky-500);color:#fff"><div class="name">Sky</div><div class="role">info · link</div></div>
</body></html>
