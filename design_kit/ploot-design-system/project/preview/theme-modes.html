<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=4"><style>
body{margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;font-family:var(--font-sans)}
.mode{padding:28px 26px;display:flex;flex-direction:column;gap:14px;min-height:380px;background:var(--bg);color:var(--fg1)}
.tag{font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:.12em;font-weight:600;text-transform:uppercase}
.hint{font-family:var(--font-display);font-style:italic;font-size:14px;color:var(--fg3);font-variation-settings:"SOFT" 100;margin-top:-8px}
h3{font-family:var(--font-display);margin:0;font-weight:500;font-size:30px;letter-spacing:-.01em;color:var(--fg1);font-variation-settings:"SOFT" 40}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.box{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:500;border:1.5px solid var(--border-ink)}
.a{background:var(--bg-elevated);color:var(--fg1);box-shadow:var(--shadow-pop)}
.b{background:var(--bg-sunken);color:var(--fg2)}
.primary{background:var(--primary);color:#fff;border:1.5px solid var(--border-ink);box-shadow:var(--shadow-pop);font-weight:600;cursor:pointer}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-ink);background:var(--bg-elevated);box-shadow:var(--shadow-pop);display:inline-flex;align-items:center;justify-content:center}
.check.on{background:var(--primary)}
.check.on::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
.swatch{display:flex;gap:6px;margin-top:4px}
.sw{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border-ink)}
</style></head><body>
<div class="mode" data-theme="light">
  <div class="tag">Light · default</div>
  <h3>Crush today.</h3>
  <div class="hint">the cream canvas</div>
  <div class="row"><div class="box a">Elevated</div><div class="box b">Sunken</div></div>
  <div class="row"><button class="box primary">Add task</button><span class="check on"></span><span class="check"></span></div>
  <div class="swatch"><div class="sw" style="background:var(--ploot-clay-500)"></div><div class="sw" style="background:var(--ploot-butter-300)"></div><div class="sw" style="background:var(--ploot-forest-500)"></div><div class="sw" style="background:var(--ploot-plum-500)"></div><div class="sw" style="background:var(--ploot-sky-500)"></div></div>
</div>
<div class="mode" data-theme="cocoa">
  <div class="tag">Cocoa · low-light</div>
  <h3>Crush today.</h3>
  <div class="hint">clay on chocolate</div>
  <div class="row"><div class="box a">Elevated</div><div class="box b">Sunken</div></div>
  <div class="row"><button class="box primary">Add task</button><span class="check on"></span><span class="check"></span></div>
  <div class="swatch"><div class="sw" style="background:var(--ploot-clay-500)"></div><div class="sw" style="background:var(--ploot-butter-300)"></div><div class="sw" style="background:var(--ploot-forest-500)"></div><div class="sw" style="background:var(--ploot-plum-500)"></div><div class="sw" style="background:var(--ploot-sky-500)"></div></div>
</div>
</body></html>
