<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg);display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.sw{display:flex;flex-direction:column;gap:4px}
.chip{height:56px;border-radius:12px;border:1.5px solid var(--border-ink);box-shadow:var(--shadow-sm)}
.name{font-family:var(--font-mono);font-size:9px;color:var(--fg2);font-weight:600;text-align:center}
</style></head><body>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-50)"></div><div class="name">50</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-100)"></div><div class="name">100</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-200)"></div><div class="name">200</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-300)"></div><div class="name">300</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-400)"></div><div class="name">400</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-500)"></div><div class="name">500</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-600)"></div><div class="name">600</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-700)"></div><div class="name">700</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-800)"></div><div class="name">800</div></div>
<div class="sw"><div class="chip" style="background:var(--ploot-ink-900)"></div><div class="name">900</div></div>
</body></html>
