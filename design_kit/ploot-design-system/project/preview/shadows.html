<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px;background:var(--bg);display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
.r{display:flex;flex-direction:column;gap:8px;align-items:center}
.box{width:72px;height:72px;border-radius:14px;background:#fff}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg2);font-weight:600;text-align:center}
.hint{font-family:var(--font-mono);font-size:9px;color:var(--fg3)}
</style></head><body>
<div class="r"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="label">xs</div><div class="hint">subtle</div></div>
<div class="r"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="label">sm</div><div class="hint">resting</div></div>
<div class="r"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="label">md</div><div class="hint">menus</div></div>
<div class="r"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="label">lg</div><div class="hint">modals</div></div>
<div class="r"><div class="box" style="border:2px solid var(--border-ink);box-shadow:var(--shadow-pop)"></div><div class="label">pop ★</div><div class="hint">signature</div></div>
</body></html>
